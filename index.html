<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoCharts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.fusioncharts.com/fusioncharts/latest/fusioncharts.js"></script>
<script src="https://cdn.fusioncharts.com/fusioncharts/latest/fusioncharts.charts.js"></script>
</head>
<body>
<div class="container py-4">
<h1>CryptoCharts</h1>

<div class="row" id="cards">
  <div class="col-md-3"><div class="card p-3"><h5>BTC/USD</h5><div id="btcusd">--</div></div></div>
  <div class="col-md-3"><div class="card p-3"><h5>BTC/EUR</h5><div id="btceur">--</div></div></div>
  <div class="col-md-3"><div class="card p-3"><h5>ETH/USD</h5><div id="ethusd">--</div></div></div>
  <div class="col-md-3"><div class="card p-3"><h5>ETH/EUR</h5><div id="etheur">--</div></div></div>
</div>

<div class="card mt-4 p-3">
<h4>Converter</h4>
<input class="form-control mb-2" id="amount" value="1">
<select class="form-select mb-2" id="asset">
<option value="bitcoin">Bitcoin (BTC)</option>
<option value="ethereum">Ethereum (ETH)</option>
</select>
<select class="form-select mb-2" id="currency">
<option value="usd">USD</option>
<option value="eur">EUR</option>
</select>
<button class="btn btn-primary" onclick="convertCurrency()">Convert</button>
<div class="mt-2" id="result"></div>
</div>

<div class="card mt-4 p-3">
<h4>Real-Time Chart</h4>
<div id="chart-container"></div>
</div>
</div>

<script src="js/api.js"></script>
<script src="js/converter.js"></script>
<script src="js/chart.js"></script>
<script src="js/app.js"></script>
</body>
</html>
